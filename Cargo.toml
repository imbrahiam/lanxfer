[package]
name = "lanxfer"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
blake3 = "1.8"
clap = { version = "4.5", features = ["derive"] }
hostname = "0.4"
indicatif = "0.18"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sysinfo = { version = "0.38", default-features = false, features = ["disk"] }
tokio = { version = "1.52", features = ["rt-multi-thread", "macros", "net", "io-util", "fs", "time", "sync"] }
uuid = { version = "1.18", features = ["v4"] }
walkdir = "2.5"
filetime = "0.2"
